<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>StructView</title>
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/markdown.css" />
  <link rel="stylesheet" href="css/json.css" />
  <link rel="stylesheet" href="css/hljs-theme.css" />
</head>
<body>

  <!-- ── Title bar (Windows/Linux custom frame) ── -->
  <div id="titlebar">
    <span id="titlebar-appname">StructView</span>
    <span id="titlebar-filename"></span>
    <div id="titlebar-spacer"></div>
  </div>

  <!-- ── Shell ── -->
  <div id="shell">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-toolbar">
        <button class="icon-btn" id="btn-open-file"  title="Open file (Ctrl+O)">
          <svg viewBox="0 0 16 16"><path d="M2 3.5A1.5 1.5 0 013.5 2h4.586a1 1 0 01.707.293l3.414 3.414A1 1 0 0112.5 6.5V13a1.5 1.5 0 01-1.5 1.5h-7A1.5 1.5 0 012 13V3.5zm1.5-.5a.5.5 0 00-.5.5V13a.5.5 0 00.5.5h7a.5.5 0 00.5-.5V7H9a1 1 0 01-1-1V3H3.5zm5 .621L11.379 6.5H8.5V3.621z"/></svg>
        </button>
        <button class="icon-btn" id="btn-open-folder" title="Open folder (Ctrl+Shift+O)">
          <svg viewBox="0 0 16 16"><path d="M1.5 2A1.5 1.5 0 000 3.5v9A1.5 1.5 0 001.5 14h13a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H8.621a.5.5 0 01-.354-.146L6.56 2.646A1.5 1.5 0 005.5 2H1.5z"/></svg>
        </button>
        <div id="sidebar-search-wrap">
          <input id="sidebar-search" type="text" placeholder="Filter files…" autocomplete="off" spellcheck="false" />
        </div>
      </div>

      <div id="file-list"></div>

      <div id="sidebar-empty">
        <p>No files open</p>
        <p>Open a file or folder to get started</p>
      </div>
    </aside>

    <!-- Main area -->
    <main id="main">

      <!-- Tab bar -->
      <div id="tab-bar"></div>

      <!-- Content pane -->
      <div id="content-area">

        <!-- Welcome screen -->
        <div id="welcome">
          <div id="welcome-inner">
            <div id="welcome-logo">SV</div>
            <h1>StructView</h1>
            <p>A clean viewer for Markdown and JSON</p>
            <div id="welcome-actions">
              <button id="welcome-open-file">Open file</button>
              <button id="welcome-open-folder">Open folder</button>
            </div>
            <p id="welcome-hint">Or drag and drop files anywhere</p>
          </div>
        </div>

        <!-- Document viewer (hidden until a file is loaded) -->
        <div id="viewer" hidden>
          <div id="viewer-toolbar">
            <div id="viewer-breadcrumb"></div>
            <div id="viewer-toolbar-right">
              <button class="icon-btn" id="btn-toggle-raw" title="Toggle raw source">
                <svg viewBox="0 0 16 16"><path d="M5.854 4.146a.5.5 0 010 .708L2.707 8l3.147 3.146a.5.5 0 01-.708.708l-3.5-3.5a.5.5 0 010-.708l3.5-3.5a.5.5 0 01.708 0zm4.292 0a.5.5 0 000 .708L13.293 8l-3.147 3.146a.5.5 0 00.708.708l3.5-3.5a.5.5 0 000-.708l-3.5-3.5a.5.5 0 00-.708 0z"/></svg>
              </button>
              <button class="icon-btn" id="btn-search-in-doc" title="Search in document (Ctrl+F)">
                <svg viewBox="0 0 16 16"><path d="M11.742 10.344a6.5 6.5 0 10-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 001.415-1.414l-3.85-3.85a1.007 1.007 0 00-.115-.099zm-5.242 1.156a5.5 5.5 0 110-11 5.5 5.5 0 010 11z"/></svg>
              </button>
            </div>
          </div>

          <!-- In-doc search bar -->
          <div id="doc-search-bar" hidden>
            <input id="doc-search-input" type="text" placeholder="Search…" autocomplete="off" spellcheck="false" />
            <span id="doc-search-count"></span>
            <button id="doc-search-prev">↑</button>
            <button id="doc-search-next">↓</button>
            <button id="doc-search-close">✕</button>
          </div>

          <!-- Rendered document -->
          <div id="doc-scroll">
            <div id="doc-content"></div>
          </div>
        </div>

      </div>

    </main>

  </div>

  <!-- About modal -->
  <div id="modal-overlay" hidden>
    <div id="modal-about">
      <div id="modal-logo">SV</div>
      <h2>StructView</h2>
      <p id="modal-version"></p>
      <p>A clean document-style viewer for Markdown and JSON files.</p>
      <button id="modal-close">Close</button>
    </div>
  </div>

  <!-- Scripts (order matters) -->
  <script src="js/vendor/marked.min.js"></script>
  <script src="js/vendor/highlight.min.js"></script>
  <script src="js/renderer/markdown.js"></script>
  <script src="js/renderer/json.js"></script>
  <script src="js/renderer/search.js"></script>
  <script src="js/renderer/tabs.js"></script>
  <script src="js/renderer/sidebar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
