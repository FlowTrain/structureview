name: CCQG Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  electron-app:
    name: structureview (Electron) — lint + test + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: structureview
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: structureview/package-lock.json
      - name: Install
        run: npm install --ignore-scripts
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Test with coverage
        run: npm run coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-electron
          path: structureview/coverage

  backend:
    name: apps/backend (Fastify) — lint + test + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Test with coverage
        run: npm run coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: apps/backend/coverage
